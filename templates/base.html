<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Админка{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('admin.admin_dashboard') }}">
            Учебный помощник
        </a>

        {% if current_user.is_authenticated %}
            <a href="{{ url_for('admin.logout') }}" class="btn btn-outline-light btn-sm">
                Выйти
            </a>
        {% endif %}
    </div>
</nav>

<div class="container mt-4">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }} shadow-sm">
                {{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
</div>
<footer class="text-center mt-5 mb-3 text-muted">
    <hr>
    <p class="mb-1">
        💡 "{{ quote.text }}"
    </p>
    <small>— {{ quote.author }}</small>
</footer>
</body>
</html>
